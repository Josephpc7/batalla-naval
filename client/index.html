<!DOCTYPE html>
<html>
<head>
  <title>Batalla Naval</title>
  <link rel="stylesheet" href="style.css">

  <!-- Librerías -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/howler"></script>
  <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
</head>
<body>

<h1>⚓ Batalla Naval</h1>

<button onclick="createRoom()">Crear Sala</button>
<input id="roomInput" placeholder="Código sala">
<button onclick="joinRoom()">Unirse</button>

<p id="roomCode"></p>

<div id="boards">
  <div>
    <h3>Tu tablero</h3>
    <div id="playerBoard"></div>
  </div>

  <div>
    <h3>Enemigo</h3>
    <div id="enemyBoard"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="board.js"></script>
<script src="drag.js"></script>
<script src="effects.js"></script>
<script src="audio.js"></script>
<script src="app.js"></script>

</body>
</html>
